name: Deploy to GitHub Pages

on:
  push:
    branches: [main, baltic]
  workflow_dispatch: # redeploy manuale (es. dopo un cambio di config Pages)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      # IMPORTANTE: GitHub Pages DEVE restare in modalità "GitHub Actions"
      # (build_type=workflow). Se Pages torna in modalità "legacy/branch" serve i
      # SOLI file committati su main → l'intero albero #15 (git-ignored) va 404.
      # configure-pages riafferma la modalità Actions a ogni deploy (idempotente).
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      # Le pagine SEO per-ente/area/categoria + i sitemap (#15) sono GIT-IGNORED
      # (artifact-only): vanno rigenerate qui dai dati COMMITTATI (data.json /
      # data-detail.json / kpi.json dell'ultima nightly) prima dell'upload, così
      # un deploy-on-push include l'intero albero /ente /aree /categoria /dominio
      # + sitemap.xml e non lascia 404. Stesso generatore della nightly.
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - run: uv sync
      - name: Build per-entity & area SEO pages + sitemap index (#15)
        run: uv run python3 scripts/build_entity_pages.py --country IT
      - uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
