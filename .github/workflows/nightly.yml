name: Nightly data update
# Pipeline notturna:
#   IT-specific:
#     fetch_indicepa --include-others (refresh seed da IndicePA)
#     enrich_from_aoo_uo (Tier-6 non-PEC, validato is_legit)
#     preprocess IT (DNS lookups)
#     postprocess (overrides + SMTP banner + scrape gated)
#     recover_it_unknowns (fallback IndicePA gated)
#     finalize_it_unknowns (S0 Tier-6 + Wikidata + scrape gated + DDG)
#     cleanup_invalid_mx_attributions (purga cross-tenant)
#     backfill_mx_discovery (provenance taxonomy)
#     aggregate_istruzione_per_comune (mappa scuole)
#   Common:
#     validate + build_frontend + build_public_dataset + commit + deploy

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: nightly-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - run: uv sync

      # --- IT seed refresh: rebuild data/municipalities_it.json from IndicePA ---
      # --include-others è obbligatorio per non perdere scuole/ministeri/ordini
      # (senza flag scrive solo comuni/province/regioni).
      - name: Refresh IT seed from IndicePA
        run: uv run python3 scripts/fetch_indicepa.py --include-others
      - name: Seed invariants (no IT-COM-XXX collisions, all are Comuni)
        run: uv run pytest tests/test_seed_invariants.py -v

      # --- Tier-6 AOO/UO enrichment: domini non-PEC dai dataset ausiliari ---
      # Cache su data/indicepa_raw/. Daily usa cache, weekly --refresh
      # manuale se vuoi re-scaricare gli 8MB+12MB.
      - name: Enrich IT seed with AOO/UO non-PEC (Tier-6)
        continue-on-error: true
        run: uv run python3 scripts/enrich_from_aoo_uo.py

      - name: Preprocess (small + medium countries)
        run: |
          # Countries with <1000 municipalities — scan every night
          SMALL=$(uv run python3 -c "
          import json
          from mail_sovereignty.preprocess import SEED_FILES
          from pathlib import Path
          large = set()
          for cc, fname in SEED_FILES.items():
              p = Path('data') / fname
              if p.exists():
                  n = len(json.load(open(p)))
                  if n >= 1000:
                      large.add(cc)
          print(' '.join(cc for cc in SEED_FILES if cc not in large and cc != 'DE'))
          ")
          echo "Small/medium countries: $SMALL"
          uv run preprocess $SMALL
      - name: Preprocess large countries (rotating)
        run: |
          # Countries with >=1000 municipalities rotate on a 3-day cycle.
          # Esclusi: DE (rotazione 3-statestate-per-night sotto) e IT
          # (preprocess dedicato daily, vedi step successivo).
          DAY_OF_YEAR=$(date +%-j)
          LARGE=$(uv run python3 -c "
          import json
          from mail_sovereignty.preprocess import SEED_FILES
          from pathlib import Path
          large = []
          for cc, fname in sorted(SEED_FILES.items()):
              if cc in ('DE', 'IT'): continue
              p = Path('data') / fname
              if p.exists():
                  n = len(json.load(open(p)))
                  if n >= 1000:
                      large.append(cc)
          day = $DAY_OF_YEAR
          group_size = (len(large) + 2) // 3
          idx = day % 3
          batch = large[idx * group_size:(idx + 1) * group_size]
          print(' '.join(batch))
          ")
          echo "Large country batch: $LARGE"
          if [ -n "$LARGE" ]; then
            uv run preprocess $LARGE
          fi

      # --- IT preprocess (daily, full) ---
      # 22,935 enti, DNS cache caldo → ~5-8 min, freddo ~30 min.
      # Sostituisce la rotazione perchè IT è il focus primario del progetto.
      - name: Preprocess IT (daily, full)
        run: uv run preprocess IT
      - name: Preprocess DE (rotating 3 states per night)
        run: |
          DAY=$(date +%j)
          IDX=$(( DAY % 6 ))
          GROUPS=("01,02,03" "04,05,06" "07,08,09" "10,11,12" "13,14,15" "16")
          IFS=',' read -ra STATES <<< "${GROUPS[$IDX]}"
          echo "Day $DAY → group $IDX: states ${STATES[*]}"
          for S in "${STATES[@]}"; do
            uv run preprocess "DE:$S"
          done
      - run: uv run postprocess

      # --- IT recovery chain: applica solo agli enti IT con provider=unknown ---
      # Ordine importante: recover (fallback IndicePA) → finalize (Tier-6 +
      # Wikidata + scrape + DDG) → cleanup (purga cross-tenant) → backfill
      # (provenance taxonomy) → aggregate (mappa scuole).
      - name: Recover IT unknowns (domain_fallbacks gated by is_legit)
        run: uv run python3 scripts/recover_it_unknowns.py
      - name: Finalize IT unknowns (Tier-6 S0 + Wikidata + scrape + DDG)
        continue-on-error: true
        run: uv run python3 scripts/finalize_it_unknowns.py
      - name: Cleanup invalid MX attributions (cross-tenant)
        run: uv run python3 scripts/cleanup_invalid_mx_attributions.py
      - name: Backfill mx_discovery_method taxonomy
        run: uv run python3 scripts/backfill_mx_discovery.py
      - name: Aggregate istruzione per comune (mappa scuole)
        continue-on-error: true
        run: uv run python3 scripts/aggregate_istruzione_per_comune.py
      # Confidence ESORICS + sovranità DOMESTIC/FOREIGN + domestic-MX-override.
      # Dopo recovery/cleanup (provider finale), prima di build_frontend
      # (così i campi confidence/jurisdiction finiscono in data-detail.json).
      - name: Confidence scoring + sovereignty (ESORICS)
        run: uv run python3 scripts/compute_confidence.py --country IT
      - name: Confidence report (1 pagina, anticipazione bounce)
        continue-on-error: true
        run: uv run python3 scripts/report_confidence.py --country IT
      - name: Anomalies report (pagina pubblica anomalie.html)
        continue-on-error: true
        run: uv run python3 scripts/report_anomalies.py --country IT

      # Quality gate = SEGNALE, non blocco del deploy. Lo score euristico
      # 0-100 di validate.py è tarato sul fork Baltic; il dataset IT
      # (con unknown onesti per integrità) sta legittimamente ~80%. Soglia
      # high-confidence calata a 75 (floor realistico). Il fallimento del
      # gate crea un issue di visibilità ma NON blocca build/deploy: il sito
      # deve sempre servire il dato corretto più recente, non restare fermo
      # su dati vecchi per un'euristica legacy.
      - name: Validate data quality (signal only)
        id: validate
        continue-on-error: true
        env:
          MIN_HIGH_CONFIDENCE_PCT: "75"
        run: uv run validate
      - name: Build frontend data
        run: uv run python3 scripts/build_frontend.py
      - name: Build public dataset (CSV/JSON/XLSX)
        run: uv run python3 scripts/build_public_dataset.py
      - name: Commit and push if changed
        run: |
          git diff --quiet data.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data-regions.json data-summary.json data-detail.json data/summary/ dist/ validation_report.json validation_report.csv data/dns_cache/ \
                  data/municipalities_it.json data/indicepa_extended_emails.json data/it_istruzione_by_comune.json \
                  data/reports/cleanup_invalid_mx_attributions.json data/reports/recover_it_unknowns_rejections.json data/reports/mx_discovery_stats.json \
                  data/reports/confidence_report.json data/reports/confidence_report.md \
                  data/reports/anomalies.json data/reports/anomalies.md
          git commit -m "chore: nightly data update"
          git pull --rebase
          git push
      - name: Create issue on quality gate failure
        if: steps.validate.outcome == 'failure'
        continue-on-error: true
        run: |
          existing=$(gh issue list --label quality-gate --state open --limit 1 --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Quality gate failed again on $(date -u +%Y-%m-%d). See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          else
            gh issue create \
              --title "Quality gate failure: nightly data update" \
              --label quality-gate \
              --body "The nightly data update failed the quality gate on $(date -u +%Y-%m-%d).

          **Action required:** Review the validation report and fix upstream data issues.

          See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # NB: nessuno step "exit 1" sul gate — il gate è un segnale, non un
      # blocco. Il job update-data deve concludersi con successo affinché
      # il job deploy (needs: update-data) pubblichi sempre il dato corretto.

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Deploy dal branch di lavoro corrente (main). Il commit notturno
          # di update-data ha già pushato i dati freschi su main; qui li
          # serviamo. NB: in passato era 'baltic' (branch storico del fork
          # Baltic) — un bug latente che avrebbe sovrascritto il sito con
          # contenuto stale a ogni run notturno.
          ref: main
      - uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
