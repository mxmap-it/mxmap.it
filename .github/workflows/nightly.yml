name: Nightly data update
# Runs preprocess (DNS) + postprocess (overrides, SMTP) + validate + deploy

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: nightly-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - run: uv sync
      - name: Preprocess (small + medium countries)
        run: |
          # Countries with <1000 municipalities — scan every night
          SMALL=$(uv run python3 -c "
          import json
          from mail_sovereignty.preprocess import SEED_FILES
          from pathlib import Path
          large = set()
          for cc, fname in SEED_FILES.items():
              p = Path('data') / fname
              if p.exists():
                  n = len(json.load(open(p)))
                  if n >= 1000:
                      large.add(cc)
          print(' '.join(cc for cc in SEED_FILES if cc not in large and cc != 'DE'))
          ")
          echo "Small/medium countries: $SMALL"
          uv run preprocess $SMALL
      - name: Preprocess large countries (rotating)
        run: |
          # Countries with >=1000 municipalities rotate on a 3-day cycle
          # (excludes DE which has its own rotation below)
          DAY_OF_YEAR=$(date +%-j)
          LARGE=$(uv run python3 -c "
          import json
          from mail_sovereignty.preprocess import SEED_FILES
          from pathlib import Path
          large = []
          for cc, fname in sorted(SEED_FILES.items()):
              if cc == 'DE': continue
              p = Path('data') / fname
              if p.exists():
                  n = len(json.load(open(p)))
                  if n >= 1000:
                      large.append(cc)
          day = $DAY_OF_YEAR
          group_size = (len(large) + 2) // 3
          idx = day % 3
          batch = large[idx * group_size:(idx + 1) * group_size]
          print(' '.join(batch))
          ")
          echo "Large country batch: $LARGE"
          if [ -n "$LARGE" ]; then
            uv run preprocess $LARGE
          fi
      - name: Preprocess DE (rotating 3 states per night)
        run: |
          DAY=$(date +%j)
          IDX=$(( DAY % 6 ))
          GROUPS=("01,02,03" "04,05,06" "07,08,09" "10,11,12" "13,14,15" "16")
          IFS=',' read -ra STATES <<< "${GROUPS[$IDX]}"
          echo "Day $DAY → group $IDX: states ${STATES[*]}"
          for S in "${STATES[@]}"; do
            uv run preprocess "DE:$S"
          done
      - run: uv run postprocess
      - name: Validate data quality
        id: validate
        continue-on-error: true
        run: uv run validate
      - name: Build frontend data
        if: steps.validate.outcome == 'success'
        run: uv run python3 scripts/build_frontend.py
      - name: Commit and push if changed
        if: steps.validate.outcome == 'success'
        run: |
          git diff --quiet data.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data-regions.json data-summary.json data-detail.json data/summary/ validation_report.json validation_report.csv data/dns_cache/
          git commit -m "chore: nightly data update"
          git pull --rebase
          git push
      - name: Create issue on quality gate failure
        if: steps.validate.outcome == 'failure'
        continue-on-error: true
        run: |
          existing=$(gh issue list --label quality-gate --state open --limit 1 --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Quality gate failed again on $(date -u +%Y-%m-%d). See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          else
            gh issue create \
              --title "Quality gate failure: nightly data update" \
              --label quality-gate \
              --body "The nightly data update failed the quality gate on $(date -u +%Y-%m-%d).

          **Action required:** Review the validation report and fix upstream data issues.

          See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Fail workflow on quality gate failure
        if: steps.validate.outcome == 'failure'
        run: exit 1

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: baltic
      - uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
